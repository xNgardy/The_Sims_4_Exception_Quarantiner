name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall cmake ninja

      - name: Install Qt
        shell: pwsh
        run: |
          python -m aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -O "$env:RUNNER_TEMP\qt"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S SimsModFixer -B SimsModFixer/build_release `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP\qt\6.8.3\msvc2022_64"

      - name: Build
        shell: pwsh
        run: |
          cmake --build SimsModFixer/build_release --config Release

      - name: Create distributable folder
        shell: pwsh
        run: |
          $packageDir = "$env:RUNNER_TEMP\SimsModFixer-windows"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item README.md "$packageDir\README.md"
          Copy-Item -Recurse "SimsModFixer/build_release/Release/*" $packageDir

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:RUNNER_TEMP\SimsModFixer-windows\*" -DestinationPath "$env:RUNNER_TEMP\SimsModFixer-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimsModFixer-windows
          path: ${{ runner.temp }}/SimsModFixer-windows.zip

  macos:
    name: macOS Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall cmake ninja

      - name: Install Qt
        run: |
          python -m aqt install-qt mac desktop 6.8.3 clang_64 -O "$RUNNER_TEMP/qt"

      - name: Configure
        run: |
          cmake -S SimsModFixer -B SimsModFixer/build_macos_release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/qt/6.8.3/macos"

      - name: Build
        run: |
          cmake --build SimsModFixer/build_macos_release

      - name: Create DMG
        run: |
          mkdir -p "$RUNNER_TEMP/dmg-root"
          cp -R "SimsModFixer/build_macos_release/SimsModFixer.app" "$RUNNER_TEMP/dmg-root/"
          cp README.md "$RUNNER_TEMP/dmg-root/README.md"
          hdiutil create -volname "SimsModFixer" -srcfolder "$RUNNER_TEMP/dmg-root" -ov -format UDZO "$RUNNER_TEMP/SimsModFixer-macos.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimsModFixer-macos
          path: ${{ runner.temp }}/SimsModFixer-macos.dmg

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SimsModFixer-windows
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SimsModFixer-macos
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/SimsModFixer-windows.zip
            release-assets/SimsModFixer-macos.dmg
